<!DOCTYPE html>
<html>
<head>
    <title>Friend Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="history-container">
    <h1 id="friendTitle">Friend Details</h1>

    <div class="summary-box">
        <div>
            <h2 id="friendSent">₹0</h2>
            <p>Total Sent</p>
        </div>

        <div>
            <h2 id="friendReturned">₹0</h2>
            <p>Total Returned</p>
        </div>

        <div>
            <h2 id="friendPending">₹0</h2>
            <p>Pending</p>
        </div>
    </div>

    <h2>Transactions</h2>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Purpose</th>
            </tr>
        </thead>
        <tbody id="friendTransactionBody"></tbody>
    </table>

    <br>
    <a href="friends.html">⬅ Back to Friends</a>
</div>

<script src="script.js"></script>

</body>
</html>
