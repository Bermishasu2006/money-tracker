<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h1>➕ Add Transaction</h1>

    <form onsubmit="saveTransaction(event)">

  <label>Friend Name</label>
  <select id="friendName">
  <option value="">Select Friend</option>
</select>
  <label>Amount (₹)</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <label>Transaction Type</label>
  <select id="type">
    <option value="sent">Money Sent</option>
    <option value="returned">Money Returned</option>
  </select>

  <label>Purpose</label>
  <input type="text" id="purpose" placeholder="Ex: BF outing, Shopping">

  <label>Notes (Optional)</label>
  <textarea id="notes" rows="4" placeholder="Enter notes"></textarea>

  <button type="submit">Save Transaction</button>

</form>

    <br>
    <a href="dashboard.html">⬅ Back to Dashboard</a>

</div>
<script src="script.js"></script>
</body>
</html>
